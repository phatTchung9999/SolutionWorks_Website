{% load static %}
<!doctype html>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analysist</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    </head>
    <body>

        <section class="hero">
            <!-- start heading -->
            <div class="container">
                <div class="row py-1">
                    <div class="col-6">
                        <i class="fs-1"><b>.ImageAnalyst</b></i>
                    </div>
                    <div class="col-6 d-flex align-items-end justify-content-end">
                        <button class="btn btn-light" style="border-radius: 50%;" onclick="backToPortfolio()"><i class="bi bi-chevron-left"></i></button>
                        <span class="mx-3 text-muted fs-2">|</span>
                        <button class="btn btn-light btn-md"><i class="bi bi-gear"></i> Settings</button>
                    </div>
                </div>
            </div>
            <hr>
            <!-- end heading -->

                <!-- start drag-drop box -->
                <div class="container mt-5 mb-5">
                    <div class="row g-5" >

                        <div class="col-12 col-xl-6 d-flex">
                            <div id="first" class="card responsive-box w-100 center shadow-lg p-3" style="border-radius: 60px;">
                                <div class="card center h-100 w-100 " style="background-color: whitesmoke; border-radius: 50px; border: dashed 1px gray;">
                                    <div class="container">
                                        <div class="row">
                                            <div id="upload-string" class="col-12 center py-3">
                                                <h4>Upload your images</h4>
                                            </div>
                                        </div>
                                        <!-- start -->
                                        <!-- Make this part as the input box to take pictures -->
                                        <div class="row">
                                            <div id="drop-box" class="col-12 text-center py-5" style=" cursor: pointer;">
                                                <img id="image-preview" src="{% static 'images/image.png' %}" class="img-fluid" style="max-width: 150px; height: auto;">
                                                <p id="input-text"><strong>Drag and Drop your files here</strong> <br>
                                                    <i style="font-size: small;">Support JPEG, PNG formats. Max file size 10MB.</i>
                                                </p>
                                                <input type="file" id="file-input" accept="image/*" hidden>
                                            </div>
                                        </div>
                                        <!-- end  -->

                                        <!-- start -->
                                        <!-- Make the button triggering the document browser -->
                                        <div class="row">
                                            <div id="upload-part" class="col-12 text-center py-4">
                                                <p>-----------   Or   ------------</p>
                                                <button class="text-light btn btn-dark" id="upload-btn">Upload Image</button>
                                            </div>

                                            <div id="extract-part" class="col-12 text-center py-4" style="display: none;">
                                                <div class="center gap-2">
                                                    <i class="d-flex mx-1">Is your picture good to be extracted?<p onclick="removeFile()" style="cursor: pointer; color: blue;">No</p></i>
                                                </div>
                                                <button class="text-light btn btn-dark" id="extract-btn">Extract</button>
                                                
                                            </div>
                                        </div>
                                        <!-- end -->
                                    </div>
                                </div>
                            </div>
                        </div>


                        <div class="col-12 col-xl-6 d-flex">
                            <div class="card responsive-box w-100 d-flex align-items-center justify-content-center shadow-lg" style="border-radius: 50px;">


                            </div>
                        </div>
                    </div>
                </div>
                <!-- end drag-drop box -->

                <!-- start change needed -->
                <div id="second" class="row mt-3" style="display: none;">

                    <div class="col-12">
                    <div onclick="removeFile()">Back</div>
                        <h5>Extracted Text</h5>
                        <div id="result-box" class="p-3 border rounded bg-light" style="min-height: 120px;">
                            No text yet
                        </div>
                    </div>
                </div>
                <!-- end change needed -->

            <hr>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
        <script src="{% static 'js/extractor_ui.js' %}"></script>    
    </body>
</html>
